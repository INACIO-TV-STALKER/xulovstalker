<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="utf-8">
  <title>Stalker IPTV Config</title>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121212; color: #e0e0e0; padding: 30px; max-width: 700px; margin: auto; }
    h2 { color: #00d1b2; text-align: center; margin-bottom: 30px; }
    .card { background: #1e1e1e; padding: 20px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); border: 1px solid #333; }
    label { display: block; margin-bottom: 8px; font-weight: bold; color: #aaa; }
    textarea { width: 100%; background: #111; color: #00ff00; border: 1px solid #444; padding: 12px; font-family: 'Consolas', monospace; border-radius: 5px; box-sizing: border-box; }
    .vpn-section { margin-top: 25px; padding: 15px; border-top: 1px solid #333; }
    .vpn-toggle { display: flex; align-items: center; cursor: pointer; font-size: 16px; color: #00d1b2; }
    .vpn-toggle input { margin-right: 12px; width: 18px; height: 18px; cursor: pointer; }
    .proxy-input-group { display: none; margin-top: 15px; transition: all 0.3s; }
    .proxy-input { width: 100%; padding: 12px; background: #2a2a2a; border: 1px solid #444; color: #fff; border-radius: 5px; box-sizing: border-box; }
    .info { font-size: 12px; color: #777; margin-top: 8px; line-height: 1.4; }
    button { background: #00d1b2; color: #000; border: none; padding: 15px; font-weight: bold; border-radius: 5px; cursor: pointer; margin-top: 30px; width: 100%; font-size: 16px; text-transform: uppercase; transition: 0.2s; }
    button:hover { background: #00f3cf; transform: translateY(-2px); }
  </style>
</head>
<body>
  <div class="card">
    <h2>Stalker / Xtream Config</h2>
    
    <label>Configuração JSON das Listas:</label>
    <textarea id="config" rows="10">
{
  "lists": [
    {
      "name": "Minha Lista",
      "url": "http://servidor.com/portal.php",
      "mac": "00:1A:79:00:00:00",
      "type": "stalker"
    }
  ]
}
    </textarea>

    <div class="vpn-section">
      <label class="vpn-toggle">
        <input type="checkbox" id="useProxy" onchange="toggleProxy()"> 
        🛡️ Ativar Perfil Proxy / VPN
      </label>
      
      <div id="proxyArea" class="proxy-input-group">
          <input type="text" id="proxyUrl" class="proxy-input" placeholder="Ex: http://user:pass@ip:porta">
          <p class="info">Cole aqui o endereço do seu Proxy (HTTP ou SOCKS5) para evitar que o servidor IPTV bloqueie o IP do Render ou corte a imagem na TV.</p>
      </div>
    </div>

    <button onclick="install()">Instalar no Stremio</button>
  </div>

  <script>
    function toggleProxy() {
      const isChecked = document.getElementById('useProxy').checked;
      document.getElementById('proxyArea').style.display = isChecked ? 'block' : 'none';
    }

    function install() {
      try {
        let configObj = JSON.parse(document.getElementById('config').value);
        const proxyVal = document.getElementById('proxyUrl').value.trim();
        const useProxy = document.getElementById('useProxy').checked;

        if (useProxy && proxyVal !== "") {
          configObj.lists.forEach(lista => { lista.proxy = proxyVal; });
        }

        // Criar link em Base64 para evitar erros de caracteres especiais
        const configString = JSON.stringify(configObj);
        const configBase64 = btoa(unescape(encodeURIComponent(configString)));

        const url = `stremio://addon-install?url=${location.origin}/manifest.json?config=${configBase64}`;
        window.location.href = url;
      } catch (e) {
        alert("Erro no JSON! Verifique as vírgulas e aspas.\n\nErro: " + e.message);
      }
    }
  </script>
</body>
</html>
